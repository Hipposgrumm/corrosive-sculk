plugins {
    id("co.uzzu.dotenv.gradle") version "4.0.0"
    id("dev.kikugie.stonecutter")
    id("dev.architectury.loom") version "1.10-SNAPSHOT" apply false
}

stonecutter.active "1.20.1-forge" /* [SC] DO NOT EDIT */

stonecutter.registerChiseled tasks.register("chiseledBuild", stonecutter.chiseled) {
    setGroup "project"
    ofTask "build"
    doLast {
        project.delete(files("$rootDir/build/libs"))
    }
}

stonecutter.registerChiseled tasks.register("chiseledBuildAndPublish", stonecutter.chiseled) {
    setGroup "project"
    dependsOn("chiseledBuild")
    ofTask("publishCurseForge")
    ofTask("modrinth")
}